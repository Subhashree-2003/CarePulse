<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Appointment Scheduling — CarePulse</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f3ef;
      --surface: #ffffff;
      --primary: #2d6a9f;
      --primary-light: #e8f0f9;
      --accent: #e8845c;
      --success: #2e9e6b;
      --danger: #d94f4f;
      --text: #1a1a2e;
      --muted: #7a7a8c;
      --border: #e4ddd5;
      --shadow: 0 4px 24px rgba(0,0,0,0.07);
      --radius: 16px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--primary);
      color: white;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 16px rgba(45,106,159,0.3);
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
    }
    header span { font-size: 0.83rem; opacity: 0.75; }

    .container { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }

    /* STATS */
    .stats { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 18px 24px;
      flex: 1; min-width: 140px;
      box-shadow: var(--shadow);
      border-top: 4px solid var(--primary);
    }
    .stat-card.accent { border-top-color: var(--accent); }
    .stat-card.success { border-top-color: var(--success); }
    .stat-card h3 { font-size: 1.9rem; font-weight: 700; color: var(--primary); }
    .stat-card.accent h3 { color: var(--accent); }
    .stat-card.success h3 { color: var(--success); }
    .stat-card p { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

    /* TOOLBAR */
    .toolbar {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 20px;
      gap: 12px; flex-wrap: wrap;
    }
    .search-box {
      display: flex; align-items: center;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 9px 16px; gap: 10px;
      flex: 1; max-width: 340px;
    }
    .search-box input {
      border: none; outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; width: 100%;
      background: transparent; color: var(--text);
    }

    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 20px; border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; font-weight: 600;
      cursor: pointer; border: none;
      transition: all 0.18s ease;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #245a8a; transform: translateY(-1px); }
    .btn-danger { background: var(--danger); color: white; font-size: 0.8rem; padding: 6px 12px; }
    .btn-edit { background: var(--primary-light); color: var(--primary); font-size: 0.8rem; padding: 6px 12px; }
    .btn-edit:hover { background: #d0e4f5; }

    /* FILTERS */
    .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-btn {
      padding: 7px 16px; border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--surface); color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
    }
    .filter-btn.active {
      background: var(--primary); color: white;
      border-color: var(--primary);
    }

    /* TABLE */
    .table-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--primary-light); }
    th {
      text-align: left; padding: 14px 18px;
      font-size: 0.76rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--primary);
    }
    td {
      padding: 14px 18px; font-size: 0.87rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #faf8f6; }

    .badge {
      display: inline-block; padding: 3px 10px;
      border-radius: 20px; font-size: 0.74rem; font-weight: 600;
    }
    .badge-today { background: #fff3cd; color: #856404; }
    .badge-upcoming { background: #d1ecf1; color: #0c5460; }
    .badge-past { background: #f0f0f0; color: #6c757d; }

    .doc-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--primary-light);
      color: var(--primary); padding: 4px 10px;
      border-radius: 20px; font-size: 0.8rem; font-weight: 500;
    }

    .actions { display: flex; gap: 6px; }

    .time-badge {
      background: #f0f7ff; color: var(--primary);
      padding: 4px 10px; border-radius: 8px;
      font-size: 0.82rem; font-weight: 600;
      display: inline-block;
    }

    /* MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      z-index: 100; align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 20px; padding: 32px;
      width: 100%; max-width: 580px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 24px 64px rgba(0,0,0,0.18);
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 24px;
    }
    .modal-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem; color: var(--primary);
    }
    .modal-close {
      background: none; border: none;
      cursor: pointer; font-size: 1.4rem;
      color: var(--muted); line-height: 1;
    }
    .modal-close:hover { color: var(--danger); }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: span 2; }
    label { font-size: 0.78rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    input, select {
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; color: var(--text);
      outline: none; background: #fafaf8;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: var(--primary); background: white; }

    .modal-footer {
      display: flex; justify-content: flex-end;
      gap: 10px; margin-top: 24px;
    }
    .btn-cancel {
      background: var(--border); color: var(--text);
      padding: 10px 20px; border-radius: 10px;
      border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-weight: 600;
    }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--primary); color: white;
      padding: 13px 20px; border-radius: 12px;
      font-size: 0.88rem; font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      transform: translateY(80px); opacity: 0;
      transition: all 0.3s ease; z-index: 999;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { background: var(--danger); }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }

    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: span 1; }
    }
  </style>
</head>
<body>

<header>
  <h1>📅 Appointment Scheduling</h1>
  <span>CarePulse — Megha's Module</span>
</header>

<div class="container">

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <h3 id="totalCount">0</h3>
      <p>Total Appointments</p>
    </div>
    <div class="stat-card accent">
      <h3 id="todayCount">0</h3>
      <p>Today</p>
    </div>
    <div class="stat-card success">
      <h3 id="upcomingCount">0</h3>
      <p>Upcoming</p>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-box">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search patient, doctor..." oninput="filterAppointments()"/>
    </div>
    <button class="btn btn-primary" onclick="openModal()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      Book Appointment
    </button>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('today', this)">Today</button>
    <button class="filter-btn" onclick="setFilter('upcoming', this)">Upcoming</button>
    <button class="filter-btn" onclick="setFilter('past', this)">Past</button>
  </div>

  <!-- Table -->
  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Patient</th>
          <th>Doctor</th>
          <th>Date</th>
          <th>Time</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="appointmentTableBody">
        <tr><td colspan="6"><div class="empty-state"><p>Loading appointments...</p></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Book Appointment</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>Patient ID *</label>
        <input type="text" id="f_patient_id" placeholder="e.g. PAT001"/>
      </div>
      <div class="form-group">
        <label>Patient Name *</label>
        <input type="text" id="f_patient_name" placeholder="Full name"/>
      </div>
      <div class="form-group full">
        <label>Doctor *</label>
        <select id="f_doctor_id">
          <option value="">Select a doctor</option>
        </select>
      </div>
      <div class="form-group">
        <label>Appointment Date *</label>
        <input type="date" id="f_appt_date"/>
      </div>
      <div class="form-group">
        <label>Appointment Time *</label>
        <input type="time" id="f_appt_time"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveAppointment()">Book Appointment</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'http://localhost:5000/api/appointments';
  let appointments = [];
  let currentFilter = 'all';
  let editingId = null;

  async function loadAppointments() {
    try {
      const res = await fetch(API);
      const json = await res.json();
      appointments = json.data || [];
      applyFilter();
      updateStats();
    } catch {
      appointments = [];
      renderTable([]);
    }
  }

  async function loadDoctors() {
    try {
      const res = await fetch(API + '/doctors/all');
      const json = await res.json();
      const select = document.getElementById('f_doctor_id');
      (json.data || []).forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.doc_id;
        opt.textContent = 'Dr. ' + d.doc_name + ' — ' + d.dept;
        select.appendChild(opt);
      });
    } catch {}
  }

  function getStatus(dateStr) {
    const today = new Date().toISOString().split('T')[0];
    if (dateStr === today) return 'today';
    if (dateStr > today) return 'upcoming';
    return 'past';
  }

  function updateStats() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('totalCount').textContent = appointments.length;
    document.getElementById('todayCount').textContent = appointments.filter(a => a.appt_date && a.appt_date.split('T')[0] === today).length;
    document.getElementById('upcomingCount').textContent = appointments.filter(a => a.appt_date && a.appt_date.split('T')[0] > today).length;
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilter();
  }

  function applyFilter() {
    const today = new Date().toISOString().split('T')[0];
    let filtered = appointments;
    if (currentFilter === 'today') filtered = appointments.filter(a => a.appt_date && a.appt_date.split('T')[0] === today);
    else if (currentFilter === 'upcoming') filtered = appointments.filter(a => a.appt_date && a.appt_date.split('T')[0] > today);
    else if (currentFilter === 'past') filtered = appointments.filter(a => a.appt_date && a.appt_date.split('T')[0] < today);
    const q = document.getElementById('searchInput').value.toLowerCase();
    if (q) filtered = filtered.filter(a => (a.patient_name + ' ' + (a.doc_name || '') + ' ' + a.patient_id).toLowerCase().includes(q));
    renderTable(filtered);
  }

  function filterAppointments() { applyFilter(); }

  function renderTable(data) {
    const tbody = document.getElementById('appointmentTableBody');
    if (data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><p>No appointments found</p></div></td></tr>';
      return;
    }
    tbody.innerHTML = data.map(a => {
      const dateStr = a.appt_date ? a.appt_date.split('T')[0] : '';
      const status = getStatus(dateStr);
      const badgeClass = status === 'today' ? 'badge-today' : status === 'upcoming' ? 'badge-upcoming' : 'badge-past';
      const badgeLabel = status.charAt(0).toUpperCase() + status.slice(1);
      const displayDate = dateStr ? new Date(dateStr + 'T00:00:00').toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) : '—';
      const displayTime = a.appt_time ? a.appt_time.slice(0, 5) : '—';
      return '<tr>' +
        '<td><strong>' + a.patient_name + '</strong><br><small style="color:var(--muted)">' + a.patient_id + '</small></td>' +
        '<td>' + (a.doc_name ? '<span class="doc-chip">👨‍⚕️ Dr. ' + a.doc_name + '</span>' : '—') + '<br><small style="color:var(--muted)">' + (a.dept || '') + '</small></td>' +
        '<td>' + displayDate + '</td>' +
        '<td><span class="time-badge">' + displayTime + '</span></td>' +
        '<td><span class="badge ' + badgeClass + '">' + badgeLabel + '</span></td>' +
        '<td><div class="actions">' +
        '<button class="btn btn-edit" onclick="editAppointment(' + a.appt_id + ')">Edit</button>' +
        '<button class="btn btn-danger" onclick="cancelAppointment(' + a.appt_id + ')">Cancel</button>' +
        '</div></td>' +
        '</tr>';
    }).join('');
  }

  function openModal(clear = true) {
    if (clear) {
      editingId = null;
      document.getElementById('modalTitle').textContent = 'Book Appointment';
      document.getElementById('f_patient_id').value = '';
      document.getElementById('f_patient_name').value = '';
      document.getElementById('f_doctor_id').value = '';
      document.getElementById('f_appt_date').value = '';
      document.getElementById('f_appt_time').value = '';
    }
    document.getElementById('modalOverlay').classList.add('active');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
  }

  function editAppointment(id) {
    const a = appointments.find(x => x.appt_id === id);
    if (!a) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = 'Edit Appointment';
    document.getElementById('f_patient_id').value = a.patient_id || '';
    document.getElementById('f_patient_name').value = a.patient_name || '';
    document.getElementById('f_doctor_id').value = a.doctor_id || '';
    document.getElementById('f_appt_date').value = a.appt_date ? a.appt_date.split('T')[0] : '';
    document.getElementById('f_appt_time').value = a.appt_time ? a.appt_time.slice(0, 5) : '';
    openModal(false);
  }

  async function saveAppointment() {
    var body = {
      patient_id: document.getElementById('f_patient_id').value.trim(),
      patient_name: document.getElementById('f_patient_name').value.trim(),
      doctor_id: document.getElementById('f_doctor_id').value,
      appt_date: document.getElementById('f_appt_date').value,
      appt_time: document.getElementById('f_appt_time').value,
    };
    if (!body.patient_id || !body.patient_name || !body.doctor_id || !body.appt_date || !body.appt_time) {
      showToast('Please fill in all required fields', true);
      return;
    }
    try {
      const url = editingId ? API + '/' + editingId : API;
      const method = editingId ? 'PUT' : 'POST';
      const res = await fetch(url, { method: method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const json = await res.json();
      if (json.success) {
        showToast(editingId ? 'Appointment updated!' : 'Appointment booked!');
        closeModal();
        loadAppointments();
      } else {
        showToast(json.message || 'Error saving appointment', true);
      }
    } catch {
      showToast('Server error. Is backend running?', true);
    }
  }

  async function cancelAppointment(id) {
    if (!confirm('Cancel this appointment?')) return;
    try {
      const res = await fetch(API + '/' + id, { method: 'DELETE' });
      const json = await res.json();
      if (json.success) { showToast('Appointment cancelled'); loadAppointments(); }
      else showToast(json.message, true);
    } catch { showToast('Server error', true); }
  }

  function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '') + ' show';
    setTimeout(function() { t.classList.remove('show'); }, 3000);
  }

  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === e.currentTarget) closeModal();
  });

  loadAppointments();
  loadDoctors();
</script>
</body>
</html>
