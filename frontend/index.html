<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Patient Management</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --primary: #1a6b5a;
      --primary-light: #e8f5f2;
      --accent: #f4a261;
      --danger: #e63946;
      --text: #1a202c;
      --muted: #718096;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(0,0,0,0.07);
      --radius: 14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--primary);
      color: white;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(26,107,90,0.3);
    }
    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      letter-spacing: 0.01em;
    }
    header span {
      font-size: 0.85rem;
      opacity: 0.75;
    }

    /* LAYOUT */
    .container { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }

    /* TOOLBAR */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .search-box {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 9px 16px;
      gap: 10px;
      flex: 1;
      max-width: 360px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .search-box input {
      border: none; outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      width: 100%;
      color: var(--text);
      background: transparent;
    }
    .search-box svg { color: var(--muted); flex-shrink: 0; }

    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 20px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.18s ease;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #155a4a; transform: translateY(-1px); }
    .btn-danger { background: var(--danger); color: white; font-size: 0.82rem; padding: 7px 14px; }
    .btn-danger:hover { background: #c1121f; }
    .btn-edit { background: var(--primary-light); color: var(--primary); font-size: 0.82rem; padding: 7px 14px; }
    .btn-edit:hover { background: #d0ede8; }

    /* STATS */
    .stats { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 18px 24px;
      flex: 1;
      min-width: 150px;
      box-shadow: var(--shadow);
      border-left: 4px solid var(--primary);
    }
    .stat-card.accent { border-left-color: var(--accent); }
    .stat-card h3 { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
    .stat-card.accent h3 { color: var(--accent); }
    .stat-card p { font-size: 0.82rem; color: var(--muted); margin-top: 4px; }

    /* TABLE */
    .table-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--primary-light); }
    th {
      text-align: left;
      padding: 14px 18px;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--primary);
    }
    td {
      padding: 14px 18px;
      font-size: 0.88rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafcfb; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-active { background: #d1fae5; color: #065f46; }
    .badge-inactive { background: #fee2e2; color: #991b1b; }
    .badge-blood { background: #fef3c7; color: #92400e; }

    .actions { display: flex; gap: 8px; }

    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 700;
      font-size: 0.85rem;
      display: flex; align-items: center; justify-content: center;
    }
    .patient-cell { display: flex; align-items: center; gap: 10px; }
    .patient-info small { color: var(--muted); font-size: 0.78rem; display: block; }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(3px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 620px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px;
    }
    .modal-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--primary);
    }
    .modal-close {
      background: none; border: none; cursor: pointer;
      font-size: 1.4rem; color: var(--muted); line-height: 1;
    }
    .modal-close:hover { color: var(--danger); }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: span 2; }
    label { font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    input, select {
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      background: #fafafa;
    }
    input:focus, select:focus { border-color: var(--primary); background: white; }

    .section-label {
      grid-column: span 2;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--primary);
      padding: 6px 0 2px;
      border-bottom: 2px solid var(--primary-light);
    }

    .modal-footer {
      display: flex; justify-content: flex-end; gap: 10px;
      margin-top: 24px;
    }
    .btn-cancel {
      background: var(--border); color: var(--text);
      padding: 10px 20px; border-radius: 10px;
      border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-weight: 600;
    }
    .btn-cancel:hover { background: #cbd5e0; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--primary); color: white;
      padding: 13px 20px; border-radius: 12px;
      font-size: 0.88rem; font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      transform: translateY(80px); opacity: 0;
      transition: all 0.3s ease;
      z-index: 999;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { background: var(--danger); }

    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty-state svg { margin-bottom: 12px; opacity: 0.35; }
    .empty-state p { font-size: 0.95rem; }

    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: span 1; }
      .section-label { grid-column: span 1; }
    }
  </style>
</head>
<body>

<header>
  <h1>🏥 Patient Management</h1>
  <span>Telemedicine System — Megha's Module</span>
</header>

<div class="container">
  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <h3 id="totalCount">0</h3>
      <p>Total Patients</p>
    </div>
    <div class="stat-card accent">
      <h3 id="activeCount">0</h3>
      <p>Active Patients</p>
    </div>
    <div class="stat-card">
      <h3 id="newCount">0</h3>
      <p>Added This Month</p>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-box">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search by name, ID, email..." oninput="filterPatients()"/>
    </div>
    <button class="btn btn-primary" onclick="openModal()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      Add Patient
    </button>
  </div>

  <!-- Table -->
  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Patient</th>
          <th>DOB / Gender</th>
          <th>Blood Group</th>
          <th>Phone</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="patientTableBody">
        <tr><td colspan="6"><div class="empty-state"><p>Loading patients...</p></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Add New Patient</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="form-grid">
      <div class="section-label">Basic Info</div>

      <div class="form-group">
        <label>Patient ID *</label>
        <input type="text" id="f_patient_id" placeholder="e.g. PAT001"/>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" id="f_phone_no" placeholder="+91 XXXXXXXXXX"/>
      </div>
      <div class="form-group">
        <label>First Name *</label>
        <input type="text" id="f_first_name" placeholder="First name"/>
      </div>
      <div class="form-group">
        <label>Last Name *</label>
        <input type="text" id="f_last_name" placeholder="Last name"/>
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="f_email_id" placeholder="patient@email.com"/>
      </div>
      <div class="form-group">
        <label>Date of Birth</label>
        <input type="date" id="f_dob"/>
      </div>
      <div class="form-group">
        <label>Gender</label>
        <select id="f_gender">
          <option value="">Select gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Blood Group</label>
        <select id="f_blood_group">
          <option value="">Select</option>
          <option>A+</option><option>A-</option>
          <option>B+</option><option>B-</option>
          <option>O+</option><option>O-</option>
          <option>AB+</option><option>AB-</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Address</label>
        <input type="text" id="f_address" placeholder="Patient address"/>
      </div>

      <div class="section-label">Medical Info</div>

      <div class="form-group">
        <label>Blood Pressure</label>
        <input type="number" step="0.1" id="f_bp" placeholder="e.g. 120.0"/>
      </div>
      <div class="form-group">
        <label>Diabetes</label>
        <input type="number" step="0.1" id="f_diabetes" placeholder="e.g. 5.4"/>
      </div>
      <div class="form-group">
        <label>Thyroid</label>
        <input type="number" step="0.1" id="f_thyroid" placeholder="e.g. 3.2"/>
      </div>
      <div class="form-group">
        <label>Cholesterol</label>
        <input type="number" step="0.1" id="f_cholesterol" placeholder="e.g. 180.0"/>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="savePatient()">Save Patient</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'http://localhost:5000/api/patients';
  let patients = [];
  let editingId = null;

  async function loadPatients() {
    try {
      const res = await fetch(API);
      const json = await res.json();
      patients = json.data || [];
      renderTable(patients);
      updateStats();
    } catch {
      patients = [];
      renderTable([]);
    }
  }

  function updateStats() {
    document.getElementById('totalCount').textContent = patients.length;
    document.getElementById('activeCount').textContent = patients.filter(p => p.is_active).length;
    const now = new Date();
    const thisMonth = patients.filter(p => {
      const d = new Date(p.created_at);
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    });
    document.getElementById('newCount').textContent = thisMonth.length;
  }

  function renderTable(data) {
    const tbody = document.getElementById('patientTableBody');
    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <p>No patients found</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(p => {
      const initials = ${p.first_name?.[0] || ''}${p.last_name?.[0] || ''}.toUpperCase();
      const dob = p.date_of_birth ? new Date(p.date_of_birth).toLocaleDateString('en-IN') : '—';
      return `
        <tr>
          <td>
            <div class="patient-cell">
              <div class="avatar">${initials}</div>
              <div class="patient-info">
                <strong>${p.first_name} ${p.last_name}</strong>
                <small>${p.patient_id} · ${p.email_id || '—'}</small>
              </div>
            </div>
          </td>
          <td>${dob}<br><small style="color:var(--muted)">${p.gender || '—'}</small></td>
          <td>${p.blood_group ? <span class="badge badge-blood">${p.blood_group}</span> : '—'}</td>
          <td>${p.phone_no || '—'}</td>
          <td><span class="badge ${p.is_active ? 'badge-active' : 'badge-inactive'}">${p.is_active ? 'Active' : 'Inactive'}</span></td>
          <td>
            <div class="actions">
              <button class="btn btn-edit" onclick="editPatient('${p.patient_id}')">Edit</button>
              <button class="btn btn-danger" onclick="deletePatient('${p.patient_id}')">Remove</button>
            </div>
          </td>
        </tr>`;
    }).join('');
  }

  function filterPatients() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = patients.filter(p =>
      ${p.first_name} ${p.last_name} ${p.patient_id} ${p.email_id}.toLowerCase().includes(q)
    );
    renderTable(filtered);
  }

  function openModal(clear = true) {
    if (clear) {
      editingId = null;
      document.getElementById('modalTitle').textContent = 'Add New Patient';
      ['patient_id','phone_no','first_name','last_name','email_id','dob','address','bp','diabetes','thyroid','cholesterol'].forEach(id => {
        const el = document.getElementById('f_' + id);
        if (el) el.value = '';
      });
      document.getElementById('f_gender').value = '';
      document.getElementById('f_blood_group').value = '';
      document.getElementById('f_patient_id').disabled = false;
    }
    document.getElementById('modalOverlay').classList.add('active');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
  }

  function editPatient(id) {
    const p = patients.find(x => x.patient_id === id);
    if (!p) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = 'Edit Patient';
    document.getElementById('f_patient_id').value = p.patient_id;
    document.getElementById('f_patient_id').disabled = true;
    document.getElementById('f_first_name').value = p.first_name || '';
    document.getElementById('f_last_name').value = p.last_name || '';
    document.getElementById('f_email_id').value = p.email_id || '';
    document.getElementById('f_phone_no').value = p.phone_no || '';
    document.getElementById('f_dob').value = p.date_of_birth ? p.date_of_birth.split('T')[0] : '';
    document.getElementById('f_gender').value = p.gender || '';
    document.getElementById('f_blood_group').value = p.blood_group || '';
    document.getElementById('f_address').value = p.Patient_address || '';
    document.getElementById('f_bp').value = p.blood_pressure || '';
    document.getElementById('f_diabetes').value = p.diabetes || '';
    document.getElementById('f_thyroid').value = p.thyroid || '';
    document.getElementById('f_cholesterol').value = p.cholesterol || '';
    openModal(false);
  }

  async function savePatient() {
    const body = {
      patient_id: document.getElementById('f_patient_id').value.trim(),
      first_name: document.getElementById('f_first_name').value.trim(),
      last_name: document.getElementById('f_last_name').value.trim(),
      email_id: document.getElementById('f_email_id').value.trim(),
      phone_no: document.getElementById('f_phone_no').value.trim(),
      date_of_birth: document.getElementById('f_dob').value,
      gender: document.getElementById('f_gender').value,
      blood_group: document.getElementById('f_blood_group').value,
      Patient_address: document.getElementById('f_address').value.trim(),
      blood_pressure: document.getElementById('f_bp').value || null,
      diabetes: document.getElementById('f_diabetes').value || null,
      thyroid: document.getElementById('f_thyroid').value || null,
      cholesterol: document.getElementById('f_cholesterol').value || null,
    };

    if (!body.patient_id || !body.first_name || !body.last_name || !body.email_id) {
      showToast('Please fill in all required fields', true);
      return;
    }

    try {
      const url = editingId ? ${API}/${editingId} : API;
      const method = editingId ? 'PUT' : 'POST';
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const json = await res.json();
      if (json.success) {
        showToast(editingId ? 'Patient updated!' : 'Patient added!');
        closeModal();
        loadPatients();
      } else {
        showToast(json.message || 'Error saving patient', true);
      }
    } catch {
      showToast('Server error. Is the backend running?', true);
    }
  }

  async function deletePatient(id) {
    if (!confirm(Deactivate patient ${id}?)) return;
    try {
      const res = await fetch(${API}/${id}, { method: 'DELETE' });
      const json = await res.json();
      if (json.success) {
        showToast('Patient deactivated');
        loadPatients();
      } else {
        showToast(json.message, true);
      }
    } catch {
      showToast('Server error', true);
    }
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '') + ' show';
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  loadPatients();
</script>
</body>
</html>
